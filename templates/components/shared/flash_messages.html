{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="fixed bottom-6 left-6 z-50 space-y-3 w-[min(92vw,380px)]">
      {% for category, message in messages %}
        <div
          class="toast-message flex items-start justify-between gap-4 rounded-2xl border px-4 py-3 text-sm shadow-2xl backdrop-blur
          {% if category == 'error' %}
            border-[var(--color-danger)] bg-red-500/10 text-red-300
          {% elif category == 'success' %}
            border-[var(--color-success)] bg-emerald-500/10 text-emerald-300
          {% else %}
            border-[var(--color-warning)] bg-yellow-500/10 text-yellow-300
          {% endif %}
          "
        >
          <span>{{ message }}</span>

          <button
            type="button"
            class="ml-2 text-lg leading-none opacity-70 transition hover:opacity-100"
            onclick="this.closest('.toast-message').remove()"
            aria-label="Cerrar notificación"
          >
            &times;
          </button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

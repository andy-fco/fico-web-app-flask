<div id="chatbot-widget" class="fixed bottom-0 right-6 z-50">
    <div id="chatbot-panel"
        class="hidden flex flex-col w-[370px] h-[520px] rounded-t-2xl border border-zinc-700 bg-zinc-950 shadow-[0_20px_70px_rgba(0,0,0,0.85)] overflow-hidden">
        <div class="flex items-center justify-between px-4 py-3 bg-zinc-900 border-b border-zinc-700">
            <div>
                <h3 class="text-sm font-semibold text-white">Asistente FiCo</h3>
                <p class="text-xs text-zinc-400">Chat financiero</p>
            </div>

            <div class="flex items-center gap-3">
                <button id="chatbot-clear" type="button" class="text-xs text-zinc-400 hover:text-[var(--color-brand-primary)] transition">
                    Limpiar
                </button>

                <button id="chatbot-close" type="button" class="text-zinc-400 hover:text-red-500">
                    ✕
                </button>
            </div>
        </div>

        <div id="chatbot-messages" class="chat-scroll flex-1 overflow-y-auto p-4 space-y-3 bg-zinc-950">
            <div
                class="w-fit max-w-[82%] rounded-2xl rounded-bl-sm border border-zinc-700 bg-zinc-800 px-4 py-3 text-sm text-zinc-100 shadow-md">
                Hola, soy el asistente de FiCo. Puedo ayudarte a analizar tus movimientos, presupuestos, objetivos y
                simulaciones.
            </div>
        </div>

        <form id="chatbot-form" class="bg-zinc-900 border-t border-zinc-700 p-3">
            <div class="flex items-center gap-3">
                <input id="chatbot-input" type="text" autocomplete="off" placeholder="Escribí un mensaje..."
                    class="flex-1 rounded-xl border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-white placeholder:text-zinc-500 focus:outline-none focus:border-[var(--color-brand-primary)]">

                <button id="chatbot-send" type="submit"
                    class="h-11 w-11 shrink-0 rounded-xl bg-[var(--color-brand-primary)] text-lg font-bold text-black shadow-md hover:bg-[var(--color-brand-hover)] transition">
                    →
                </button>
            </div>
        </form>
    </div>

    <button id="chatbot-toggle" type="button"
        class="mb-6 flex h-14 w-14 items-center justify-center rounded-full bg-[var(--color-brand-primary)] text-black font-bold shadow-[0_25px_70px_rgba(0,0,0,0.95)] hover:scale-105 transition">
        IA
    </button>
</div>

<script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        FiCo | Dashboard
        {% endblock %}
    </title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/output.css') }}">
</head>

<body class="bg-zinc-950 text-white min-h-screen">

    <div class="min-h-screen flex flex-col">

        {% include 'components/dashboard/topbar.html' %}

        <div class="flex flex-1">

            {% include 'components/dashboard/sidebar.html' %}

            <main class="flex-1 p-6 lg:p-8">
                {% include 'components/shared/flash_messages.html' %}
                {% block content %}
                {% endblock %}
            </main>

        </div>

        {% include 'components/dashboard/chat_widget.html' %}
        {% include 'components/shared/confirm_modal.html' %}
    </div>

</body>
</html>
